name = "dgc"
main = "src/index.ts"
compatibility_date = "2026-06-28"
workers_dev = true

[vars]
GEMINI_MODEL = "gemini-3.5-flash"
GEMINI_FALLBACK_MODEL = "gemini-3.1-flash-lite"
OPENROUTER_MODEL = "nvidia/nemotron-3-ultra-550b-a55b:free"
MAX_OUTPUT_TOKENS = "2048"
SYSTEM_PROMPT = "You are a helpful Discord assistant. Answer clearly and concisely. Match the user's language. Discord markdown is supported. Discord does not render LaTeX, so never use LaTeX syntax such as $...$, $$...$$, \\(...\\), \\[...\\], or LaTeX commands. Write equations and mathematical notation in plain text or simple Unicode instead."

[[queues.producers]]
binding = "GEMINI_QUEUE"
queue = "dgc-gemini"

[[queues.consumers]]
queue = "dgc-gemini"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 2
